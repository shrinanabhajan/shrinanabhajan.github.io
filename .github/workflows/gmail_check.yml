name: Gmail API Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (Only to get the script)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Execute Monitor
        env:
          PYTHONUNBUFFERED: "1"  # This ensures logs flow in real-time
          GMAIL_USER: ${{ secrets.GMAIL_APP_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_APP_PASSWORD }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python check_email.py
